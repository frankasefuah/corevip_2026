<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="COREVIP 2027 multilingual event website with venue map, registration, FAQ, and contact sections." />
  <title>COREVIP 2027 | AAU Diamond Jubilee</title>

  <!--
    ======================================================
    HEAD / GLOBAL NOTES
    ======================================================
    - Change the page title above if needed.
    - Update the meta description above for SEO.
    - If you want a different font, replace the Google Fonts link below.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Accessibility helper for keyboard navigation -->
  <a class="skip-link" href="#main">Skip to content</a>

  <!--
    ======================================================
    SITE HEADER
    ======================================================
    - Update the brand text below if you want a different event title.
    - Language selector is rendered by JavaScript inside #languageSwitcher.
    - Update navigation links if you rename section IDs.
  -->
  <header class="site-header" id="top">
    <div class="container header-inner">
      <a href="#top" class="brand">
        <span class="brand-mark">60</span>
        <span>
          <strong>COREVIP 2027</strong>
          <small>AAU Diamond Jubilee</small>
        </span>
      </a>

      <nav class="site-nav" aria-label="Primary navigation">
        <a href="#about" data-i18n="nav.about">About</a>
        <a href="#program" data-i18n="nav.program">Program</a>
        <a href="#gallery" data-i18n="nav.gallery">Venue & Gallery</a>
        <a href="#registration" data-i18n="nav.registration">Registration</a>
        <a href="#contact" data-i18n="nav.contact">Contact</a>
      </nav>

      <div class="header-actions">
        <div id="languageSwitcher" class="language-switcher"></div>
        <a class="button button-primary header-cta" href="#registration" data-i18n="nav.cta">Register</a>
      </div>
    </div>
  </header>

  <!--
    ======================================================
    CUSTOMIZER REMOVED FROM VIEW
    ======================================================
    - As requested, the customizer/section chooser is no longer shown.
    - Final section choices are controlled inside script.js using the fixed state object.
  -->

  <!--
    ======================================================
    MAIN CONTENT RENDER TARGETS
    ======================================================
    - JavaScript renders each section into these containers.
    - If you remove a section completely, remove its ID here and the render call in script.js.
  -->
  <main id="main">
    <div id="heroSection"></div>
    <div id="organizersSection"></div>
    <div id="countdownSection"></div>
    <div id="aboutSection"></div>
    <div id="programSection"></div>
    <div id="speakersSection"></div>
    <div id="gallerySection"></div>
    <div id="videosSection"></div>
    <div id="testimonialsSection"></div>
    <div id="partnersSection"></div>
    <div id="exhibitorsSection"></div>
    <div id="hotelsSection"></div>
    <div id="registrationSection"></div>
    <div id="ticketsSection"></div>
    <div id="contactSection"></div>
    <div id="faqSection"></div>
    <div id="blogSection"></div>
  </main>

  <!--
    ======================================================
    FOOTER
    ======================================================
    - Update footer text or links below if needed.
  -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <h3>COREVIP 2027</h3>
        <p data-i18n="footer.text">A multilingual, production-ready conference website built with plain HTML, CSS, and JavaScript.</p>
      </div>
      <div class="footer-links">
        <a href="#about" data-i18n="nav.about">About</a>
        <a href="#program" data-i18n="nav.program">Program</a>
        <a href="#registration" data-i18n="nav.registration">Registration</a>
        <a href="#contact" data-i18n="nav.contact">Contact</a>
      </div>
    </div>
  </footer>

  <!--
    ======================================================
    LIGHTBOX FOR GALLERY IMAGES
    ======================================================
    - JavaScript updates the image and caption here.
  -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close image preview">×</button>
    <figure class="lightbox-card">
      <img id="lightboxImage" src="" alt="" />
      <figcaption id="lightboxCaption"></figcaption>
    </figure>
  </div>

  <!--
    ======================================================
    BACK TO TOP BUTTON (ICON ONLY)
    ======================================================
    - Replace the arrow character below with an SVG icon if you prefer.
  -->
  <button id="backToTop" class="back-to-top" aria-label="Back to top" title="Back to top">↑</button>

  <script src="script.js" defer></script>
</body>
</html>
